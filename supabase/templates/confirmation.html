<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KuraNote Verification Code</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f8fafc;
      color: #0f172a;
      font-family:
        -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background: #f8fafc"
    >
      <tr>
        <td align="center" style="padding: 24px 0">
          <table
            role="presentation"
            width="520"
            cellspacing="0"
            cellpadding="0"
            style="
              width: 100%;
              max-width: 520px;
              background: #ffffff;
              border-radius: 16px;
              border: 1px solid #e2e8f0;
            "
          >
            <tr>
              <td style="padding: 32px">
                <h1
                  style="
                    margin: 0 0 16px;
                    font-size: 22px;
                    line-height: 1.4;
                    color: #0f172a;
                  "
                >
                  Your KuraNote verification code
                </h1>
                <p
                  style="
                    margin: 0 0 20px;
                    font-size: 15px;
                    line-height: 1.8;
                    color: #334155;
                  "
                >
                  Enter the code below to complete your KuraNote sign-up.
                </p>
                <p
                  style="
                    margin: 0 0 24px;
                    padding: 18px 24px;
                    background: #f1f5f9;
                    border-radius: 12px;
                    text-align: center;
                    font-size: 32px;
                    line-height: 1.2;
                    letter-spacing: 0.18em;
                    font-weight: 700;
                    color: #0f172a;
                  "
                >
                  {{ .Token }}
                </p>
                <p
                  style="
                    margin: 0 0 12px;
                    font-size: 14px;
                    line-height: 1.8;
                    color: #475569;
                  "
                >
                  This code expires in 10 minutes. If it has expired, return to
                  KuraNote to request a new one.
                </p>
                <p
                  style="
                    margin: 0;
                    font-size: 13px;
                    line-height: 1.7;
                    color: #64748b;
                  "
                >
                  If you didn't try to sign up for KuraNote, you can safely
                  ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
