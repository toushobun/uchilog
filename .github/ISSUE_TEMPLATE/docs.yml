name: Docs
description: 文档新增・文档修改相关 Issue
title: "docs: "
labels: ["documentation"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 请用中文说明需要新增或修改哪些文档。
      placeholder: 例如：补充部署流程和环境变量说明。
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景 / 目的
      description: 为什么需要这份文档？面向谁阅读？
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 说明本 Issue 涉及的文档范围。
      placeholder: 例如：README、docs/theme.md、GitHub 模板等。
    validations:
      required: false
  - type: textarea
    id: branch
    attributes:
      label: Branch 命名
      description: 创建分支时请使用 docs/issue_number_xxx 格式。
      placeholder: docs/302_update_deploy_notes
    validations:
      required: false
  - type: textarea
    id: tasks
    attributes:
      label: TODO
      description: 拆分需要完成的文档事项。
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 备注
      description: 其他补充信息。
    validations:
      required: false
