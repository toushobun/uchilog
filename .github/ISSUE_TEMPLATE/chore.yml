name: Chore
description: 依赖更新・配置调整・维护作业相关 Issue
title: "chore: "
labels: ["chore"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 请用中文说明本维护作业要做什么。
      placeholder: 例如：更新 CI 配置并整理本地工具忽略规则。
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景 / 目的
      description: 为什么需要这项维护？解决什么维护成本或协作问题？
    validations:
      required: false
  - type: textarea
    id: branch
    attributes:
      label: Branch 命名
      description: 创建分支时请使用 chore/issue_number_xxx 格式。
      placeholder: chore/302_update_ci_config
    validations:
      required: false
  - type: textarea
    id: tasks
    attributes:
      label: TODO
      description: 拆分需要完成的维护事项。
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 备注
      description: 其他补充信息。
    validations:
      required: false
