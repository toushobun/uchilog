name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: supabase-migrations-main
      cancel-in-progress: false

    outputs:
      migrations_changed: ${{ steps.check-migrations.outputs.changed }}

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for migration changes
        id: check-migrations
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- supabase/migrations/ | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Supabase CLI
        if: steps.check-migrations.outputs.changed == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: v2.106.0
          github-token: ${{ github.token }}

      - name: Check required configuration
        if: steps.check-migrations.outputs.changed == 'true'
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not set."
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "SUPABASE_DB_PASSWORD is not set."
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "SUPABASE_PROJECT_REF is not set."
            exit 1
          fi

      - name: Link Supabase project
        if: steps.check-migrations.outputs.changed == 'true'
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"

      - name: Show migration status
        if: steps.check-migrations.outputs.changed == 'true'
        run: supabase migration list --linked

      - name: Apply migrations
        if: steps.check-migrations.outputs.changed == 'true'
        run: supabase db push

  deploy:
    name: Deploy to Vercel Production
    needs: migrate
    # 无 migration 变更时只跳过 Supabase 相关 step，migrate job 仍为 success。
    if: always() && needs.migrate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
