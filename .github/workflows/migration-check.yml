name: Migration check

on:
  pull_request:
    branches:
      - main
    # paths 未命中时不会创建 workflow，因此不要将 Migration check 设为全局 required check。
    paths:
      - "supabase/migrations/**"
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  migration-check:
    name: Migration check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: v2.106.0
          github-token: ${{ github.token }}

      - name: Check required configuration
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not set."
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "SUPABASE_DB_PASSWORD is not set."
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "SUPABASE_PROJECT_REF is not set."
            exit 1
          fi

      - name: Link Supabase project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"

      - name: Check migrations dry run
        run: supabase db push --dry-run
