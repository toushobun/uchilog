name: Supabase migrations

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target Supabase environment
        required: true
        type: choice
        options:
          - dev
          - staging
        default: dev

permissions:
  contents: read

concurrency:
  group: supabase-migrations-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  apply-migrations:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Check required configuration
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not set."
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "SUPABASE_DB_PASSWORD is not set."
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "SUPABASE_PROJECT_REF is not set."
            exit 1
          fi

      - name: Link Supabase project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"

      - name: Show migration status
        run: supabase migration list --linked

      - name: Apply migrations
        run: supabase db push
